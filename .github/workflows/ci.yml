name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      N8N_TIMEOUT: 5
      N8N_BASE_URL: http://127.0.0.1:5678
      QDRANT_URL: http://127.0.0.1:6333
      MINIO_ENDPOINT: 127.0.0.1:9000
      REDIS_URL: redis://127.0.0.1:6379/0
      POSTGRES_HOST: 127.0.0.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check apps scripts

      - name: Python syntax check
        run: python -m compileall -q apps scripts

      - name: Config coverage
        run: |
          python - <<'PY'
          from apps.edr.config import settings

          env_keys = [
              line.split("=", 1)[0]
              for line in open(".env.example", encoding="utf-8")
              if line.strip() and not line.startswith("#")
          ]
          config_keys = {field.upper() for field in type(settings).model_fields}
          missing = sorted(set(env_keys) - config_keys)
          extra = sorted(config_keys - set(env_keys))
          assert len(env_keys) == 40, len(env_keys)
          assert not missing, missing
          assert not extra, extra
          print("config coverage: 40/40")
          PY

      - name: Documentation drift check
        run: python scripts/check_doc_drift.py

      - name: AI context check
        run: python scripts/check_ai_context.py

      - name: Smoke tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q apps/edr/tests/smoke

      - name: Integration tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q apps/edr/tests/integration -m "not live_probe"

      - name: Evaluation suite
        env:
          PYTHONPATH: .
        run: python -m apps.edr.evaluation.run --suite goldenset --min-pass-rate 0.95 --min-precision 0.90

      - name: pip-audit (advisory only)
        # Surface advisories but do not gate the build — Phase 1H triaged safe
        # pins and accepted-risk major-version bumps remain. The editable
        # ``decision-center`` install is skipped (it is not on PyPI).
        continue-on-error: true
        run: pip-audit --progress-spinner off

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Bundle size check
        working-directory: frontend
        run: npm run check-bundle

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit

      - name: UI tests (headless)
        working-directory: frontend
        run: npm run test:ui
