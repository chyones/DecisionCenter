services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./staging:/staging
      - ./final:/final
      - ./logs:/logs
    depends_on:
      - postgres
      - redis
      - qdrant
      - minio
      - n8n
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-decision_center}
      POSTGRES_USER: ${POSTGRES_USER:-decision_center}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-decisioncenter}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  n8n:
    image: n8nio/n8n:1.91.3
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_BASE_URL:-http://localhost:5678}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n:/workflows:ro
    ports:
      - "5678:5678"

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  n8n-data:
  caddy-data:
  caddy-config:
