services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - ./staging:/staging
      - ./final:/final
      - ./logs:/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      n8n:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-decision_center}
      POSTGRES_USER: ${POSTGRES_USER:-decision_center}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-decision_center} -d ${POSTGRES_DB:-decision_center}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant-data:/qdrant/storage
    # Qdrant is internal-only; do not bind to a public port.
    expose:
      - "6333"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-decisioncenter}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me}
    volumes:
      - minio-data:/data
    # MinIO API + console are accessible only from localhost on the host.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:1.91.3
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${N8N_BASE_URL:-http://localhost:5678}
      OWNCLOUD_USERNAME: ${OWNCLOUD_USERNAME:-}
      OWNCLOUD_PASSWORD: ${OWNCLOUD_PASSWORD:-}
      ODOO_URL: ${ODOO_URL:-}
      ODOO_DATABASE: ${ODOO_DATABASE:-}
      ODOO_USERNAME: ${ODOO_USERNAME:-}
      ODOO_API_KEY: ${ODOO_API_KEY:-}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n:/workflows:ro
    # n8n editor UI is internal-only; webhook traffic flows app → n8n inside the
    # compose network. Operators who need the editor can ssh-tunnel to 5678.
    expose:
      - "5678"

  caddy:
    image: caddy:2-alpine
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/usr/share/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  minio-data:
  n8n-data:
  caddy-data:
  caddy-config:
